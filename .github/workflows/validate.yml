name: Validate Tap

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop, feature/**, bugfix/**, release/**, hotfix/**]

jobs:
  validate:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure scripts are executable
        run: |
          chmod +x scripts/*.sh scripts/lib/*.sh tests/*.sh tests/unit/*.sh tests/integration/*.sh tests/e2e/*.sh || true

      - name: Run script tests
        run: bash tests/run_tests.sh

      - name: Validate all formulas
        run: bash scripts/validate_formulas.sh

      - name: Optional brew audit
        run: |
          if command -v brew >/dev/null 2>&1; then
            for f in Formula/*.rb; do
              brew audit --formula "$f"
            done
          else
            echo "brew is not available in this runner; skipping brew audit."
          fi
